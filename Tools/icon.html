<!doctype html>
<!--
  WhistleCounter app icon.

  Renders a 1024x1024 icon in three variants via ?variant= query param:
    any     — opaque terracotta gradient background
    dark    — transparent background, elements only
    tinted  — monochrome on transparent

  Rasterized to PNG by Tools/generate-icons.sh using headless Chrome.
  The page is intentionally minimal: no fonts, no images, no JS
  frameworks — so rendering is deterministic across Chrome versions.
-->
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>WhistleCounter icon</title>
    <style>
      :root {
        --size: 1024px;

        /* Warm domestic palette. */
        --bg-top:      #e8794a; /* terracotta */
        --bg-bottom:   #b84b27; /* deeper rust */

        /* Cream body — gradient top (light) to bottom (darker). */
        --cream-top:      #fcf3e4;
        --cream-mid:      #f5e6d3;
        --cream-bottom:   #d8c4a8;

        --accent:      #3a1f15; /* dark cocoa */
        --cooker-dark: #e0d5c5; /* dimmer cream for dark variant */
        --tint:        #ffffff; /* white, iOS applies user tint */
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      html, body {
        width: var(--size);
        height: var(--size);
        background: var(--bg-bottom);
      }

      .canvas {
        position: relative;
        width: var(--size);
        height: var(--size);
        overflow: hidden;
      }

      /* Variant: any (light mode / opaque). */
      body[data-variant="any"] .canvas {
        background: linear-gradient(180deg, var(--bg-top) 0%, var(--bg-bottom) 100%);
      }

      /* Variant: dark (transparent, iOS composites the system dark material). */
      body[data-variant="dark"] .canvas,
      body[data-variant="tinted"] .canvas {
        background: transparent;
      }

      /* Cooker body. Rounded rectangle with a slight taper —
         bottom is narrower than the top, like a traditional pot. */
      .cooker-body {
        position: absolute;
        left: 50%;
        top: 60%;
        transform: translate(-50%, -50%);
        width: 580px;
        height: 400px;
        border-radius: 70px;
        /* Inset the bottom corners to taper the shape. */
        clip-path: polygon(
          0% 0%,      /* top-left  */
          100% 0%,    /* top-right */
          90% 100%,   /* bottom-right, pulled in */
          10% 100%    /* bottom-left,  pulled in */
        );
      }

      /* Cooker lid — slightly wider stripe just above the body. */
      .cooker-lid {
        position: absolute;
        left: 50%;
        top: 45%;
        transform: translate(-50%, -50%);
        width: 640px;
        height: 56px;
        border-radius: 28px;
      }

      /* Handles. */
      .handle {
        position: absolute;
        top: 64%;
        width: 78px;
        height: 36px;
        border-radius: 18px;
      }
      .handle-left  { left: 150px; }
      .handle-right { right: 150px; }

      /* Whistle stem + cap. */
      .whistle-stem {
        position: absolute;
        left: 50%;
        top: 36%;
        transform: translate(-50%, 0);
        width: 52px;
        height: 92px;
        border-radius: 26px;
      }
      .whistle-cap {
        position: absolute;
        left: 50%;
        top: 35%;
        transform: translate(-50%, -50%);
        width: 112px;
        height: 42px;
        border-radius: 21px;
      }

      /* Steam / sound-wave arcs — iOS 26 "Liquid Glass" style.
         Each arc is a thick, translucent, frosted stroke with a
         subtle inner highlight to mimic specular refraction. */
      .steam {
        position: absolute;
        left: 50%;
        transform: translateX(-50%);
        border-radius: 50%;
        background: transparent;
      }
      .steam.s1 {
        width: 180px;
        height: 180px;
        top: 125px;
        border: 32px solid transparent;
      }
      .steam.s2 {
        width: 300px;
        height: 300px;
        top: 50px;
        border: 30px solid transparent;
      }
      .steam.s3 {
        width: 420px;
        height: 420px;
        top: -25px;
        border: 26px solid transparent;
      }
      /* Clip to top arc only. */
      .steam.s1 { clip-path: polygon(5% 0, 95% 0, 95% 50%, 5% 50%); }
      .steam.s2 { clip-path: polygon(5% 0, 95% 0, 95% 50%, 5% 50%); }
      .steam.s3 { clip-path: polygon(8% 0, 92% 0, 92% 50%, 8% 50%); }

      /* ---- Per-variant fills ---- */

      /* ANY — vertical gradients give the cream shapes a subtle
         "rounded surface" feeling without faking a full 3D render.
         iOS 26 will add its own Liquid Glass specular on top. */
      body[data-variant="any"] .cooker-body {
        background: linear-gradient(
          180deg,
          var(--cream-top)    0%,
          var(--cream-mid)   55%,
          var(--cream-bottom) 100%
        );
      }
      body[data-variant="any"] .cooker-lid {
        background: linear-gradient(
          180deg,
          var(--cream-top)    0%,
          var(--cream-mid)   55%,
          var(--cream-bottom) 100%
        );
      }
      body[data-variant="any"] .handle {
        background: linear-gradient(
          180deg,
          var(--cream-mid)     0%,
          var(--cream-bottom) 100%
        );
      }
      body[data-variant="any"] .whistle-stem,
      body[data-variant="any"] .whistle-cap {
        background: var(--cream-top);
      }
      body[data-variant="any"] .steam {
        border-color: rgba(255, 255, 255, 0.55);
        box-shadow:
          inset 0 0 8px 2px rgba(255, 255, 255, 0.7),
          0 0 12px 2px rgba(255, 255, 255, 0.15);
        backdrop-filter: blur(6px);
        -webkit-backdrop-filter: blur(6px);
      }
      body[data-variant="any"] .steam.s1 { opacity: 0.95; }
      body[data-variant="any"] .steam.s2 { opacity: 0.75; }
      body[data-variant="any"] .steam.s3 { opacity: 0.50; }

      /* DARK */
      body[data-variant="dark"] .cooker-body,
      body[data-variant="dark"] .cooker-lid,
      body[data-variant="dark"] .handle {
        background: var(--cooker-dark);
      }
      body[data-variant="dark"] .whistle-stem,
      body[data-variant="dark"] .whistle-cap {
        background: var(--cream-mid);
      }
      body[data-variant="dark"] .steam {
        border-color: rgba(255, 255, 255, 0.45);
        box-shadow:
          inset 0 0 8px 2px rgba(255, 255, 255, 0.5),
          0 0 10px 2px rgba(255, 255, 255, 0.1);
      }
      body[data-variant="dark"] .steam.s1 { opacity: 0.9; }
      body[data-variant="dark"] .steam.s2 { opacity: 0.65; }
      body[data-variant="dark"] .steam.s3 { opacity: 0.40; }

      /* TINTED — everything white on transparent; iOS tints it. */
      body[data-variant="tinted"] .cooker-body,
      body[data-variant="tinted"] .cooker-lid,
      body[data-variant="tinted"] .handle,
      body[data-variant="tinted"] .whistle-stem,
      body[data-variant="tinted"] .whistle-cap {
        background: var(--tint);
      }
      body[data-variant="tinted"] .steam {
        border-color: rgba(255, 255, 255, 0.6);
      }
      body[data-variant="tinted"] .steam.s1 { opacity: 0.95; }
      body[data-variant="tinted"] .steam.s2 { opacity: 0.7; }
      body[data-variant="tinted"] .steam.s3 { opacity: 0.45; }
    </style>
  </head>
  <body data-variant="any">
    <div class="canvas">
      <div class="steam s3"></div>
      <div class="steam s2"></div>
      <div class="steam s1"></div>
      <div class="whistle-cap"></div>
      <div class="whistle-stem"></div>
      <div class="cooker-lid"></div>
      <div class="cooker-body"></div>
      <div class="handle handle-left"></div>
      <div class="handle handle-right"></div>
    </div>
    <script>
      // Set the variant from the URL query: ?variant=any|dark|tinted
      const params = new URLSearchParams(window.location.search);
      const variant = params.get("variant") || "any";
      document.body.setAttribute("data-variant", variant);
    </script>
  </body>
</html>
