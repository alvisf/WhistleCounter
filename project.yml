name: WhistleCounter
options:
  bundleIdPrefix: com.alvisf
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.10"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    SWIFT_STRICT_CONCURRENCY: complete

targets:
  WhistleCounter:
    type: application
    platform: iOS
    sources:
      - path: WhistleCounter
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alvisf.WhistleCounter
        INFOPLIST_FILE: WhistleCounter/Info.plist
        TARGETED_DEVICE_FAMILY: "1,2"
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: NO

  WhistleCounterTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: WhistleCounterTests
    dependencies:
      - target: WhistleCounter
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.alvisf.WhistleCounterTests
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES

schemes:
  WhistleCounter:
    build:
      targets:
        WhistleCounter: all
        WhistleCounterTests: [test]
    test:
      targets:
        - WhistleCounterTests
    run:
      config: Debug
    archive:
      config: Release
