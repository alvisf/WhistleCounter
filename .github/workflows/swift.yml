name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test on iOS Simulator
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show build tools
        run: |
          xcodebuild -version
          swift --version

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Find an iPhone simulator
        run: |
          DEVICE_ID=$(xcrun simctl list devices available \
            | grep -E "iPhone 1[567]" \
            | head -1 \
            | grep -oE '[A-F0-9-]{36}')
          echo "Using simulator $DEVICE_ID"
          echo "DEVICE_ID=$DEVICE_ID" >> "$GITHUB_ENV"

      - name: Build & test
        run: |
          xcodebuild \
            -project WhistleCounter.xcodeproj \
            -scheme WhistleCounter \
            -destination "platform=iOS Simulator,id=$DEVICE_ID" \
            -configuration Debug \
            -derivedDataPath build \
            test
